name: Update and Publish SDK

on:
  repository_dispatch:
    types: [update-sdk]
  workflow_dispatch:  # Allow manual trigger

jobs:
  update-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Fetch current version from swagger
        id: fetch-version
        run: |
          SWAGGER_URL="https://api.linkbreakers.com/internal/openapi/api/v1/api.swagger.json"
          NEW_VERSION=$(curl -s "$SWAGGER_URL" | jq -r '.info.version')
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "Swagger version: $NEW_VERSION"

      - name: Read current OPENAPI_VERSION
        id: current-version
        run: |
          if [ -f OPENAPI_VERSION ]; then
            CURRENT_VERSION=$(cat OPENAPI_VERSION)
          else
            CURRENT_VERSION="0.0.0"
          fi
          echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "Current version: $CURRENT_VERSION"

      - name: Compare versions
        id: compare
        run: |
          if [ "${{ steps.fetch-version.outputs.new_version }}" == "${{ steps.current-version.outputs.current_version }}" ]; then
            echo "needs_update=false" >> $GITHUB_OUTPUT
            echo "✅ Versions match. No update needed."
          else
            echo "needs_update=true" >> $GITHUB_OUTPUT
            echo "🔄 Version changed: ${{ steps.current-version.outputs.current_version }} → ${{ steps.fetch-version.outputs.new_version }}"
          fi

      - name: Install dependencies
        if: steps.compare.outputs.needs_update == 'true'
        run: npm install

      - name: Download and convert OpenAPI spec to 3.1
        if: steps.compare.outputs.needs_update == 'true'
        run: |
          # Download OpenAPI 3.2.0 spec
          curl -o openapi-3.2.json https://api.linkbreakers.com/internal/openapi/api/v1/api.swagger.json

          # Convert OpenAPI 3.2 to 3.1 (remove 3.2-specific fields)
          node -e "
            const fs = require('fs');
            const spec = JSON.parse(fs.readFileSync('openapi-3.2.json', 'utf8'));

            // Change version to 3.1.0
            spec.openapi = '3.1.0';

            // Remove 3.2-specific fields
            delete spec.jsonSchemaDialect;

            fs.writeFileSync('openapi-3.1.json', JSON.stringify(spec, null, 2));
          "

          echo "✅ OpenAPI spec converted from 3.2 to 3.1"

      - name: Generate SDK using OpenAPI Generator
        if: steps.compare.outputs.needs_update == 'true'
        run: |
          # Remove old generated code
          rm -rf src

          # Generate SDK using OpenAPI Generator with typescript-fetch (creates proper SDK classes)
          npx @openapitools/openapi-generator-cli generate \
            -i openapi-3.1.json \
            -g typescript-fetch \
            -o generated-temp \
            --skip-validate-spec \
            --additional-properties=npmName=@linkbreakers/sdk,supportsES6=true,withInterfaces=true

          # Move only the source files to src/ (keep our package.json, tsconfig.json, etc.)
          mkdir -p src
          if [ -d "generated-temp/src" ]; then
            cp -r generated-temp/src/* src/
          else
            cp -r generated-temp/*.ts src/ 2>/dev/null || true
            cp -r generated-temp/apis src/ 2>/dev/null || true
            cp -r generated-temp/models src/ 2>/dev/null || true
          fi

          # Clean up
          rm -rf generated-temp
          rm openapi-3.2.json openapi-3.1.json

          echo "✅ SDK generated successfully"

      - name: Update version files
        if: steps.compare.outputs.needs_update == 'true'
        run: |
          NEW_VERSION="${{ steps.fetch-version.outputs.new_version }}"

          # Update OPENAPI_VERSION file
          echo "$NEW_VERSION" > OPENAPI_VERSION

          # Update package.json version
          npm version "$NEW_VERSION" --no-git-tag-version

          # Add openapi-fetch as dependency
          npm install --save-exact openapi-fetch

          echo "✅ Version files updated to $NEW_VERSION"

      - name: Build SDK
        if: steps.compare.outputs.needs_update == 'true'
        run: npm run build

      - name: Configure Git
        if: steps.compare.outputs.needs_update == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit changes
        if: steps.compare.outputs.needs_update == 'true'
        run: |
          NEW_VERSION="${{ steps.fetch-version.outputs.new_version }}"

          git add .
          git commit -m "chore: update SDK to API version $NEW_VERSION"

          echo "✅ Changes committed"

      - name: Create and push tag
        if: steps.compare.outputs.needs_update == 'true'
        run: |
          NEW_VERSION="${{ steps.fetch-version.outputs.new_version }}"

          git tag "v$NEW_VERSION"
          git push origin main
          git push origin "v$NEW_VERSION"

          echo "✅ Tag v$NEW_VERSION created and pushed"

      - name: Publish to npm
        if: steps.compare.outputs.needs_update == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm publish --access public
          echo "✅ Published @linkbreakers/sdk@${{ steps.fetch-version.outputs.new_version }} to npm"

      - name: Summary
        if: steps.compare.outputs.needs_update == 'true'
        run: |
          echo "🎉 SDK successfully updated and published!"
          echo "Version: ${{ steps.fetch-version.outputs.new_version }}"
          echo "Package: https://www.npmjs.com/package/@linkbreakers/sdk"
